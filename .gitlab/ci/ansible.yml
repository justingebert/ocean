.ansible_base:
  image: alpine:3.20
  cache:
    key:
      files:
        - ops/ansible/requirements.yml
    paths:
      - .ansible/collections/
  before_script:
    - apk add --no-cache ansible bash curl openssh-client
    - install -m 700 -d "$ANSIBLE_LOCAL_TEMP"
    - install -m 700 -d "$ANSIBLE_COLLECTIONS_PATH"
    - ansible-galaxy collection install -r ops/ansible/requirements.yml -p "$ANSIBLE_COLLECTIONS_PATH"

validate:ansible:
  extends: .ansible_base
  stage: validate
  rules:
    - changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*.yml
        - ops/ansible/**/*
        - ops/compose/**/*
  script:
    - cd ops/ansible
    - ansible-inventory -i inventory.yml --list >/dev/null
    - ansible-playbook -i inventory.yml playbook.yml --syntax-check
