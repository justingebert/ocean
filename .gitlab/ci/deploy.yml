# Shared Ansible deployment wrapper.
.deploy_ansible:
  extends: .ansible_base
  stage: deploy
  resource_group: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - when: never
  environment:
    name: $DEPLOY_ENVIRONMENT_NAME
    deployment_tier: production
  script:
    # Prepare SSH access. Ansible below accepts new host keys on first connect.
    - |
      test -n "${ANSIBLE_SSH_PRIVATE_KEY:-}" || {
        echo "ANSIBLE_SSH_PRIVATE_KEY is required."
        exit 1
      }

      install -m 700 -d ~/.ssh
      if [ -f "$ANSIBLE_SSH_PRIVATE_KEY" ]; then
        cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
      else
        printf '%s\n' "$ANSIBLE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
      fi
      chmod 600 ~/.ssh/id_ed25519
    # Fail early when a target-specific secret is missing.
    - |
      for required in $ANSIBLE_REQUIRED_ENV; do
        value="$(printenv "$required" || true)"
        if [ -z "$value" ]; then
          echo "$required is required."
          exit 1
        fi
      done
    # Download TLS material only for hosts that terminate TLS.
    - |
      if [ "${ANSIBLE_FETCH_SECURE_FILES:-false}" = "true" ]; then
        bash -eo pipefail -c 'curl -fsSL "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash'
        export OCEAN_TLS_SRC="$CI_PROJECT_DIR/.secure_files"
      fi
    - cd ops/ansible
    # Run the one playbook against the requested inventory group.
    - |
      ANSIBLE_SSH_COMMON_ARGS="-o StrictHostKeyChecking=accept-new" \
      GITLAB_REGISTRY_USER="${CI_REGISTRY_USER:-}" \
      GITLAB_REGISTRY_PASSWORD="${CI_REGISTRY_PASSWORD:-}" \
      ansible-playbook \
        -i inventory.yml \
        playbook.yml \
        --limit "$ANSIBLE_LIMIT" \
        -e "backend_image=$BACKEND_IMAGE:latest" \
        -e "frontend_image=$FRONTEND_IMAGE:latest"

deploy:app:
  extends: .deploy_ansible
  variables:
    ANSIBLE_LIMIT: app
    ANSIBLE_FETCH_SECURE_FILES: "true"
    ANSIBLE_REQUIRED_ENV: OCEAN_APPLICATION_SECRET OCEAN_JWT_SECRET OCEAN_POSTGRES_ORM_PASSWORD OCEAN_PG_CLUSTER_PASSWORD OCEAN_MONGODB_CLUSTER_PASSWORD
    DEPLOY_ENVIRONMENT_NAME: production/app

deploy:pg:
  extends: .deploy_ansible
  variables:
    ANSIBLE_LIMIT: pg
    ANSIBLE_FETCH_SECURE_FILES: "true"
    ANSIBLE_REQUIRED_ENV: OCEAN_PG_CLUSTER_PASSWORD
    DEPLOY_ENVIRONMENT_NAME: production/pg

deploy:mongo:
  extends: .deploy_ansible
  variables:
    ANSIBLE_LIMIT: mongo
    ANSIBLE_FETCH_SECURE_FILES: "true"
    ANSIBLE_REQUIRED_ENV: OCEAN_MONGODB_CLUSTER_PASSWORD
    DEPLOY_ENVIRONMENT_NAME: production/mongo

deploy:ops:
  extends: .deploy_ansible
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $DEPLOY_OPS == "true"'
      when: manual
      allow_failure: true
    - when: never
  variables:
    ANSIBLE_LIMIT: ops
    ANSIBLE_FETCH_SECURE_FILES: "false"
    ANSIBLE_REQUIRED_ENV: ""
    DEPLOY_ENVIRONMENT_NAME: production/ops
