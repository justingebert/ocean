# Local openldap (docker-compose: bitnamilegacy/openldap:2)
# Bitnami defaults: base dc=example,dc=org, users under ou=users
# Seeded users: user01/password1, user02/password2
ldap.host = "localhost"
ldap.port = 1389
ldap.startTls = false
ldap.useSsl = false
ldap.name = "cn=%USER%,%USER_ROOT%"
ldap.userRoot = "ou=users,dc=example,dc=org"
