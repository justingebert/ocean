name: ocean-dev

services:
  openldap:
    image: bitnamilegacy/openldap:2
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
      LDAP_USERS: user01,user02
      LDAP_PASSWORDS: password1,password2
    ports:
      - "1389:1389"
      - "1636:1636"

  postgres_orm:
    image: postgres:12-alpine
    environment:
      POSTGRES_DB: internal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_orm_data:/var/lib/postgresql/data

#ldap login doesnt work atm needs hba.conf wired up
  pg_cluster:
    image: postgres:12.20
    depends_on:
      - openldap
    environment:
      POSTGRES_DB: internal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    volumes:
      - pg_cluster_data:/var/lib/postgresql/data
#      - ./ops/compose/pg/pg_hba.local.conf:/etc/postgresql/pg_hba.conf:ro
#    command: >-
#      postgres
#      -c hba_file=/etc/postgresql/pg_hba.conf

  mongodb_cluster:
    image: mongo:5
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: toor
    ports:
      - "27017:27017"
    volumes:
      - mongodb_cluster_data:/data/db

  adminer:
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: "pg_cluster:5432"
    depends_on:
      - postgres_orm
      - pg_cluster
    ports:
      - "8080:8080"

volumes:
  postgres_orm_data:
  pg_cluster_data:
  mongodb_cluster_data:
