name: ocean-dev

services:
  openldap:
    image: osixia/openldap:1.5.0
    # --copy-service lets it pick up the inline seed config mounted below.
    command: ["--copy-service"]
    environment:
      LDAP_ORGANISATION: "Ocean Dev"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: adminpassword
    configs:
      - source: ocean_ldap_seed
        target: /container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif
    ports:
      - "389:389"
      - "1636:636"

  postgres_orm:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: internal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_orm_data:/var/lib/postgresql

  pg_cluster:
    image: postgres:18.4
    depends_on:
      - openldap
    environment:
      POSTGRES_DB: internal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    volumes:
      - pg_cluster_data:/var/lib/postgresql
    configs:
      - source: pg_hba_local
        target: /etc/postgresql/pg_hba.conf
    command: >-
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf

  mongodb_cluster:
    image: mongo:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: toor
    ports:
      - "27017:27017"
    volumes:
      - mongodb_cluster_data:/data/db

  adminer:
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: "pg_cluster:5432"
    depends_on:
      - postgres_orm
      - pg_cluster
    ports:
      - "8080:8080"

volumes:
  postgres_orm_data:
  pg_cluster_data:
  mongodb_cluster_data:

configs:
  pg_hba_local:
    content: |
      # PostgreSQL Client Authentication Configuration for local docker-compose.
      # Production uses ops/compose/pg/pg_hba.conf against HTW LDAPS; this dev

      # TYPE     DATABASE  USER            ADDRESS       METHOD
      local      all       all                           trust
      host       all       all             127.0.0.1/32  trust
      host       all       all             ::1/128       trust

      # Local docker-network clients.
      host       all       +ldap_role      samenet       ldap ldapserver=openldap ldapprefix="cn=" ldapsuffix=",ou=users,dc=example,dc=org" ldapport=389
      host       all       +generic_role   samenet       scram-sha-256
      host       all       postgres        samenet       scram-sha-256
      host       all       all             samenet       reject

      # Host-published port clients. Docker Desktop traffic can arrive from a
      # gateway address outside Postgres' `samenet`.
      host       all       +ldap_role      all           ldap ldapserver=openldap ldapprefix="cn=" ldapsuffix=",ou=users,dc=example,dc=org" ldapport=389
      host       all       +generic_role   all           scram-sha-256
      host       all       postgres        all           scram-sha-256
      host       all       all             all           reject

  ocean_ldap_seed:
    # Mock LDAP for local dev. osixia loads this once on first boot.
    content: |
      # Let signed-in users read the directory, so the backend can look up
      # a user's details right after they log in.
      dn: olcDatabase={1}mdb,cn=config
      changetype: modify
      replace: olcAccess
      olcAccess: {0}to * by dn.exact=gidNumber=0+uidNumber=0,cn=peercred,cn=external,cn=auth manage by * break
      olcAccess: {1}to attrs=userPassword,shadowLastChange by self write by dn="cn=admin,dc=example,dc=org" write by anonymous auth by * none
      olcAccess: {2}to * by self read by dn="cn=admin,dc=example,dc=org" write by users read by * none

      # Folder that holds the user accounts.
      dn: ou=users,dc=example,dc=org
      changetype: add
      objectClass: organizationalUnit
      ou: users

      # Staff account.
      dn: cn=user01,ou=users,dc=example,dc=org
      changetype: add
      objectClass: inetOrgPerson
      cn: user01
      givenName: Sabine
      sn: Krause
      mail: sabine.krause@htw-berlin.de
      employeeType: Staff
      userPassword: password1

      # Student account.
      dn: cn=user02,ou=users,dc=example,dc=org
      changetype: add
      objectClass: inetOrgPerson
      cn: user02
      givenName: Bob
      sn: Mueller
      mail: bob.mueller@students.htw-berlin.de
      employeeType: Student
      userPassword: password2

      # Student account.
      dn: cn=user03,ou=users,dc=example,dc=org
      changetype: add
      objectClass: inetOrgPerson
      cn: user03
      givenName: Carla
      sn: Wagner
      mail: carla.wagner@students.htw-berlin.de
      employeeType: Student
      userPassword: password3
