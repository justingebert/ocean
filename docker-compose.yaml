name: ocean-dev

services:
  openldap:
    image: bitnamilegacy/openldap:2
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
      LDAP_USERS: user01,user02
      LDAP_PASSWORDS: password1,password2
    ports:
      - "1389:1389"
      - "1636:1636"

  postgres_orm:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: internal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_orm_data:/var/lib/postgresql

  pg_cluster:
    image: postgres:18.4
    depends_on:
      - openldap
    environment:
      POSTGRES_DB: internal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    volumes:
      - pg_cluster_data:/var/lib/postgresql
    configs:
      - source: pg_hba_local
        target: /etc/postgresql/pg_hba.conf
    command: >-
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf

  mongodb_cluster:
    image: mongo:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: toor
    ports:
      - "27017:27017"
    volumes:
      - mongodb_cluster_data:/data/db

  adminer:
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: "pg_cluster:5432"
    depends_on:
      - postgres_orm
      - pg_cluster
    ports:
      - "8080:8080"

volumes:
  postgres_orm_data:
  pg_cluster_data:
  mongodb_cluster_data:

# decided against creating a file since this could and would cause confusuion is this just a hba conf
configs:
  pg_hba_local:
    content: |
      # PostgreSQL Client Authentication Configuration for local docker-compose.
      # Production uses ops/compose/pg/pg_hba.conf against HTW LDAPS; this dev

      # TYPE     DATABASE  USER            ADDRESS       METHOD
      local      all       all                           trust
      host       all       all             127.0.0.1/32  trust
      host       all       all             ::1/128       trust

      # Local docker-network clients.
      host       all       +ldap_role      samenet       ldap ldapserver=openldap ldapprefix="cn=" ldapsuffix=",ou=users,dc=example,dc=org" ldapport=1389
      host       all       +generic_role   samenet       scram-sha-256
      host       all       postgres        samenet       scram-sha-256
      host       all       all             samenet       reject

      # Host-published port clients. Docker Desktop traffic can arrive from a
      # gateway address outside Postgres' `samenet`.
      host       all       +ldap_role      all           ldap ldapserver=openldap ldapprefix="cn=" ldapsuffix=",ou=users,dc=example,dc=org" ldapport=1389
      host       all       +generic_role   all           scram-sha-256
      host       all       postgres        all           scram-sha-256
      host       all       all             all           reject
