- name: Bootstrap Ocean on Lima
  hosts: app
  become: true
  vars:
    ocean_user: ocean
    etc_ocean: /etc/ocean
    data_root: /srv/ocean
    repo_root: "{{ playbook_dir }}/../.."
    force_build: true #Set to false (`-e force_build=false`) to skip rebuild when images already exist.

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - python3-docker
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker Engine + compose plugin
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Create ocean user, add to docker group
      ansible.builtin.user:
        name: "{{ ocean_user }}"
        shell: /bin/bash
        groups: docker
        append: true
        create_home: true

    - name: Create /etc/ocean
      ansible.builtin.file:
        path: "{{ etc_ocean }}"
        state: directory
        owner: "{{ ocean_user }}"
        group: "{{ ocean_user }}"
        mode: "0750"

    - name: Stage env files (do not overwrite local edits)
      ansible.builtin.copy:
        src: "{{ repo_root }}/ops/single-vm/env/{{ item }}.env.example"
        dest: "{{ etc_ocean }}/{{ item }}.env"
        owner: "{{ ocean_user }}"
        group: "{{ ocean_user }}"
        mode: "0600"
        force: false
      loop:
        - compose
        - backend
        - postgres_orm
        - pg_cluster
        - mongodb_cluster
        - openldap

    - name: Stage docker-compose.yml
      ansible.builtin.copy:
        src: "{{ repo_root }}/ops/single-vm/docker-compose.yml"
        dest: "{{ etc_ocean }}/docker-compose.yml"
        owner: "{{ ocean_user }}"
        group: "{{ ocean_user }}"
        mode: "0640"

    - name: Create /srv/ocean data root
      ansible.builtin.file:
        path: "{{ data_root }}"
        state: directory
        owner: "{{ ocean_user }}"
        group: "{{ ocean_user }}"
        mode: "0750"

    - name: Create per-service data dirs
      ansible.builtin.file:
        path: "{{ data_root }}/{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "0700"
      loop:
        - { path: postgres_orm/data, owner: "70" }
        - { path: pg_cluster/data, owner: "999" }
        - { path: mongodb_cluster/data, owner: "999" }


    - name: Build backend image
      community.docker.docker_image:
        name: ocean-backend
        tag: latest
        source: build
        force_source: "{{ force_build | bool }}"
        build:
          path: "{{ repo_root }}/backend"
          network: host
          pull: false
      tags: build

    - name: Build frontend image
      community.docker.docker_image:
        name: ocean-frontend
        tag: latest
        source: build
        force_source: "{{ force_build | bool }}"
        build:
          path: "{{ repo_root }}/frontend"
          network: host
          pull: false
          args:
            VITE_API_URL: /v1
            VITE_POSTGRESQL_HOSTNAME: localhost
            VITE_POSTGRESQL_PORT: "5555"
            VITE_MONGODB_HOSTNAME: localhost
            VITE_MONGODB_PORT: "27017"
            VITE_ADMINER_URL: ""
            VITE_ISSUE_LINK: https://github.com/HTWHub/ocean/issues
      tags: build

    - name: Bring up compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ etc_ocean }}"
        env_files:
          - "{{ etc_ocean }}/compose.env"
        state: present
        remove_orphans: true
      tags: compose
