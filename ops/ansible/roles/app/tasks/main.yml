- name: Stage docker-compose.yml
  ansible.builtin.copy:
    src: "{{ compose_src }}"
    dest: "{{ etc_ocean }}/docker-compose.yml"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0640"

- name: Stage compose env file
  ansible.builtin.template:
    src: compose.env.j2
    dest: "{{ etc_ocean }}/compose.env"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0600"

- name: Validate app deploy secrets
  ansible.builtin.assert:
    that:
      - ocean_application_secret | length >= 32
      - ocean_jwt_secret | length >= 32
      - ocean_postgres_orm_password | length > 0
      - ocean_pg_cluster_password | length > 0
      - ocean_mongodb_cluster_password | length > 0
      - "'change-me' not in ocean_application_secret"
      - "'change-me' not in ocean_jwt_secret"
      - "'change-me' not in ocean_postgres_orm_password"
      - "'change-me' not in ocean_pg_cluster_password"
      - "'change-me' not in ocean_mongodb_cluster_password"
    fail_msg: "Set real OCEAN_* deploy secrets before running the app role."

- name: Render app env files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ etc_ocean }}/{{ item }}"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0600"
  loop:
    - backend.env
    - postgres_orm.env
  no_log: true
  diff: false

- name: Render frontend runtime config
  ansible.builtin.template:
    src: frontend-config.js.j2
    dest: "{{ etc_ocean }}/frontend-config.js"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0644"

- name: Create postgres_orm data dir
  ansible.builtin.file:
    path: "{{ data_root }}/postgres_orm/data"
    state: directory
    owner: "70"
    group: "70"
    mode: "0700"


- name: Log in to container registry
  ansible.builtin.command:
    argv:
      - docker
      - login
      - "{{ docker_registry_url }}"
      - --username
      - "{{ docker_registry_username }}"
      - --password-stdin
    stdin: "{{ docker_registry_password }}"
  environment: "{{ outbound_proxy_env | default({}) }}"
  register: docker_login_result
  changed_when: "'Login Succeeded' in docker_login_result.stdout"
  no_log: true
  when:
    - docker_registry_url | length > 0
    - docker_registry_username | length > 0
    - docker_registry_password | length > 0
  tags:
    - compose
    - registry

- name: Bring up app compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ etc_ocean }}"
    env_files:
      - "{{ etc_ocean }}/compose.env"
    state: present
    build: never
    pull: policy
    remove_orphans: true
  tags: compose
