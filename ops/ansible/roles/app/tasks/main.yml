- name: Stage docker-compose.yml
  ansible.builtin.copy:
    src: "{{ compose_src }}"
    dest: "{{ etc_ocean }}/docker-compose.yml"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0640"

- name: Stage env files
  ansible.builtin.copy:
    src: "{{ env_src }}/{{ item }}.env.example"
    dest: "{{ etc_ocean }}/{{ item }}.env"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0600"
    force: true
  loop:
    - compose
    - backend
    - postgres_orm

- name: Create postgres_orm data dir
  ansible.builtin.file:
    path: "{{ data_root }}/postgres_orm/data"
    state: directory
    owner: "70"
    group: "70"
    mode: "0700"


- name: Log in to container registry
  community.docker.docker_login:
    registry_url: "{{ docker_registry_url }}"
    username: "{{ docker_registry_username }}"
    password: "{{ docker_registry_password }}"
    reauthorize: "{{ docker_registry_reauthorize | bool }}"
  environment: "{{ build_proxy_args | default({}) }}"
  when:
    - docker_registry_url | length > 0
    - docker_registry_username | length > 0
    - docker_registry_password | length > 0
  tags:
    - compose
    - registry

- name: Bring up app compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ etc_ocean }}"
    env_files:
      - "{{ etc_ocean }}/compose.env"
    state: present
    build: never
    pull: policy
    remove_orphans: true
  environment: "{{ build_proxy_args | default({}) }}"
  tags: compose
