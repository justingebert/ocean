- name: Ensure remote repo root exists
  ansible.builtin.file:
    path: "{{ repo_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

# synchronize pushes over SSH as ansible_user, not via sudo on the remote.
- name: Sync backend build context to VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../backend/"
    dest: "{{ repo_root }}/backend/"
    delete: true
    rsync_opts:
      - "--exclude=target"
      - "--exclude=.bsp"
      - "--exclude=.metals"
      - "--exclude=.bloop"
      - "--exclude=project/target"
      - "--exclude=project/project"
      - "--exclude=logs"
  become: false

- name: Sync frontend build context to VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../frontend/"
    dest: "{{ repo_root }}/frontend/"
    delete: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
      - "--exclude=.vite"
  become: false

- name: Stage docker-compose.yml
  ansible.builtin.copy:
    src: "{{ compose_src }}"
    dest: "{{ etc_ocean }}/docker-compose.yml"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0640"

- name: Stage env files
  ansible.builtin.copy:
    src: "{{ env_src }}/{{ item }}.env.example"
    dest: "{{ etc_ocean }}/{{ item }}.env"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0600"
    force: true
  loop:
    - compose
    - backend
    - postgres_orm
    - openldap

- name: Create postgres_orm data dir
  ansible.builtin.file:
    path: "{{ data_root }}/postgres_orm/data"
    state: directory
    owner: "70"
    group: "70"
    mode: "0700"

- name: Build backend image
  community.docker.docker_image:
    name: ocean-backend
    tag: latest
    source: build
    force_source: "{{ force_build | bool }}"
    build:
      path: "{{ repo_root }}/backend"
      network: host
      pull: false
      args: "{{ build_proxy_args }}"
  tags: build

- name: Build frontend image
  community.docker.docker_image:
    name: ocean-frontend
    tag: latest
    source: build
    force_source: "{{ force_build | bool }}"
    build:
      path: "{{ repo_root }}/frontend"
      network: host
      pull: false
      args: "{{ vite_build_args | combine(build_proxy_args) }}"
  tags: build

- name: Bring up app compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ etc_ocean }}"
    env_files:
      - "{{ etc_ocean }}/compose.env"
    state: present
    remove_orphans: true
  tags: compose
