- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - python3-docker
      - rsync
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker Engine + compose plugin
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure docker.service systemd dropin dir
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"
  when: outbound_proxy_url is defined and outbound_proxy_url | length > 0

- name: Configure Docker daemon HTTP proxy
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service.d/http-proxy.conf
    mode: "0644"
    content: |
      [Service]
      Environment="HTTP_PROXY={{ outbound_proxy_url }}"
      Environment="HTTPS_PROXY={{ outbound_proxy_url }}"
      Environment="NO_PROXY={{ outbound_no_proxy }}"
  when: outbound_proxy_url is defined and outbound_proxy_url | length > 0
  notify: Restart docker

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create ocean user, add to docker group
  ansible.builtin.user:
    name: "{{ ocean_user }}"
    shell: /bin/bash
    groups: docker
    append: true
    create_home: true

- name: Create config dir
  ansible.builtin.file:
    path: "{{ etc_ocean }}"
    state: directory
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0750"

- name: Create data root
  ansible.builtin.file:
    path: "{{ data_root }}"
    state: directory
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0750"
