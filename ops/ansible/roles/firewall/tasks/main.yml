- name: Render firewall script
  ansible.builtin.template:
    src: firewall.sh.j2
    dest: /root/firewall.sh
    owner: root
    group: root
    mode: "0700"
  register: fw_script

- name: Check whether Docker is running
  ansible.builtin.systemd:
    name: docker
  register: docker_state
  failed_when: false
  changed_when: false

- name: Apply firewall (flush + rebuild + persist)
  ansible.builtin.command: /root/firewall.sh
  when: fw_script.changed
  notify: Restart docker if running
