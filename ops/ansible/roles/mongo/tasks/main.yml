- name: Stage docker-compose.yml
  ansible.builtin.copy:
    src: "{{ compose_src }}"
    dest: "{{ etc_ocean }}/docker-compose.yml"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0640"

- name: Validate mongo deploy secret
  ansible.builtin.assert:
    that:
      - ocean_mongodb_cluster_password | length > 0
      - "'change-me' not in ocean_mongodb_cluster_password"
    fail_msg: "Set OCEAN_MONGODB_CLUSTER_PASSWORD before running the mongo role."

- name: Render mongodb_cluster.env
  ansible.builtin.template:
    src: mongodb_cluster.env.j2
    dest: "{{ etc_ocean }}/mongodb_cluster.env"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0600"
  no_log: true
  diff: false

- name: Create mongodb_cluster data dir
  ansible.builtin.file:
    path: "{{ data_root }}/mongodb_cluster/data"
    state: directory
    owner: "999"
    group: "999"
    mode: "0700"

- name: Bring up mongo compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ etc_ocean }}"
    state: present
    remove_orphans: true
  tags: compose
