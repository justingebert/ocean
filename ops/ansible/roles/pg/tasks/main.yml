- name: Stage docker-compose.yml
  ansible.builtin.copy:
    src: "{{ compose_src }}"
    dest: "{{ etc_ocean }}/docker-compose.yml"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0640"

- name: Stage pg_hba.conf
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../ops/compose/pg/pg_hba.conf"
    dest: "{{ etc_ocean }}/pg_hba.conf"
    owner: "999"
    group: "999"
    mode: "0640"

- name: Stage LDAP CA for Postgres LDAP auth
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../backend/docker/dfn-community-root-ca-2022.pem"
    dest: "{{ etc_ocean }}/dfn-community-root-ca-2022.pem"
    owner: "root"
    group: "root"
    mode: "0644"

- name: Stage Caddyfile
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../ops/compose/pg/Caddyfile"
    dest: "{{ etc_ocean }}/Caddyfile"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0644"

- name: Validate pg deploy secret
  ansible.builtin.assert:
    that:
      - ocean_pg_cluster_password | length > 0
      - "'change-me' not in ocean_pg_cluster_password"
    fail_msg: "Set OCEAN_PG_CLUSTER_PASSWORD before running the pg role."

- name: Render pg_cluster.env
  ansible.builtin.template:
    src: pg_cluster.env.j2
    dest: "{{ etc_ocean }}/pg_cluster.env"
    owner: "{{ ocean_user }}"
    group: "{{ ocean_user }}"
    mode: "0600"
  no_log: true
  diff: false

- name: Create pg_cluster data dir
  ansible.builtin.file:
    path: "{{ data_root }}/pg_cluster/data"
    state: directory
    owner: "999"
    group: "999"
    mode: "0700"

- name: Bring up pg compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ etc_ocean }}"
    state: present
    remove_orphans: true
  tags: compose
