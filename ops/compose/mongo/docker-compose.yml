name: ocean-mongo

services:
  mongodb_cluster:
    image: mongo:8.0
    restart: unless-stopped
    env_file: /etc/ocean/mongodb_cluster.env
    ports:
      - "27017:27017"
    volumes:
      - /srv/ocean/mongodb_cluster/data:/data/db
      - /etc/ocean/tls:/etc/ssl/ocean:ro
    command:
      - mongod
      - --tlsMode=requireTLS
      - --tlsCertificateKeyFile=/etc/ssl/ocean/combined.pem
      - --setParameter=tlsUseSystemCA=true
      - --tlsAllowConnectionsWithoutCertificates
      - --auth
