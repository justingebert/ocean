# PostgreSQL Client Authentication Configuration.

# TYPE     DATABASE  USER            ADDRESS       METHOD
# Local sockets/loopback are only reachable inside the pg container/VM.
local      all       all                           trust
host       all       all             127.0.0.1/32  trust
host       all       all             ::1/128       trust

# Docker-network clients. LDAP-backed users have no Postgres password, so do not
# let them fall through to md5 on non-SSL connections.
hostnossl  all       +generic_role   samenet       md5
hostnossl  all       postgres        samenet       md5
hostnossl  all       all             samenet       reject

hostssl all +ldap_role    0.0.0.0/0 ldap ldapscheme="ldaps" ldapserver="login-dc-03.login.htw-berlin.de" ldapprefix="cn=" ldapsuffix=",ou=idmusers,dc=login,dc=htw-berlin,dc=de" ldapport=636
hostssl all +generic_role 0.0.0.0/0 md5

# External TCP clients must still use TLS.
hostssl    all       all   0.0.0.0/0       md5
hostssl    all       all   ::/0            md5
