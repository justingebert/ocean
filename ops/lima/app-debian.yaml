minimumLimaVersion: 2.0.0

base:
  - template:_images/debian-13
  - template:_default/mounts

cpus: 4
memory: 6GiB
disk: 80GiB

containerd:
  system: false
  user: false

portForwards:
  - guestPort: 80
    hostPort: 8088
    hostIP: 127.0.0.1

message: |
  Ocean app-vm is ready.

  Frontend forwarded to:
    http://127.0.0.1:8088
