minimumLimaVersion: 2.0.0

base:
  - template:_images/debian-13
  - template:_default/mounts

cpus: 2
memory: 3GiB
disk: 40GiB

containerd:
  system: false
  user: false

portForwards:
  - guestPort: 27017
    hostPort: 57017
    hostIP: 127.0.0.1

message: |
  Ocean mongo-vm is ready.
  Managed Mongo reachable on host loopback: 127.0.0.1:57017
